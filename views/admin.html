<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA DIGITAL | Dashboard</title>
    <link rel="stylesheet" href="/public/css/style.css">
    <script src="https://kit.fontawesome.com/your-kit-id.js" crossorigin="anonymous"></script>
    <style>
        :root { --sidebar-w: 280px; }
        body { display: flex; background: var(--bg-deep); min-height: 100vh; }
        .sidebar {
            width: var(--sidebar-w);
            background: var(--bg-surface);
            border-right: 1px solid var(--glass-border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }
        .main-content {
            margin-left: var(--sidebar-w);
            flex: 1;
            padding: 3rem;
            max-width: 1200px;
        }
        .admin-nav { list-style: none; margin-top: 3rem; }
        .admin-nav li { margin-bottom: 0.5rem; }
        .admin-nav a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            transition: var(--transition-smooth);
        }
        .admin-nav a:hover, .admin-nav a.active {
            background: var(--glass);
            color: var(--primary-light);
        }
        .edit-card {
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            margin-bottom: 2rem;
        }
        .edit-card h3 { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        input, textarea, select {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 10px;
            color: white;
            font-family: inherit;
        }
        .save-bar {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg-surface);
            padding: 1rem 2rem;
            border-radius: 50px;
            border: 1px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            gap: 1rem;
            align-items: center;
            z-index: 100;
        }
        .table-admin { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .table-admin th { text-align: left; padding: 1rem; color: var(--text-muted); border-bottom: 1px solid var(--glass-border); }
        .table-admin td { padding: 1rem; border-bottom: 1px solid var(--glass-border); }
        .msg-preview { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.85rem; }
        
        /* Mobile Admin Responsiveness */
        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 1.5rem;
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
            }
            .admin-nav { margin-top: 1.5rem; display: flex; flex-wrap: wrap; gap: 0.5rem; }
            .admin-nav li { margin-bottom: 0; flex: 1 1 calc(50% - 0.5rem); }
            .main-content { margin-left: 0; padding: 1.5rem; }
            .form-row { grid-template-columns: 1fr; }
            .edit-card { padding: 1.5rem; }
            .save-bar { bottom: 1rem; right: 1rem; left: 1rem; justify-content: center; }
            .table-admin { display: block; overflow-x: auto; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <span class="logo-text">AURA<span>PANEL</span></span>
        <ul class="admin-nav">
            <li><a href="#" onclick="showSection('general')" id="nav-general" class="active"><i class="fas fa-cog"></i> Geral</a></li>
            <li><a href="#" onclick="showSection('hero')" id="nav-hero"><i class="fas fa-rocket"></i> Hero Section</a></li>
            <li><a href="#" onclick="showSection('content')" id="nav-content"><i class="fas fa-edit"></i> Conteúdo</a></li>
            <li><a href="#" onclick="showSection('leads')" id="nav-leads"><i class="fas fa-envelope"></i> Mensagens</a></li>
            <li style="margin-top: 2rem;"><a href="/" target="_blank"><i class="fas fa-external-link-alt"></i> Ver Site</a></li>
            <li><a href="#" onclick="logout()" style="color: var(--secondary);"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <!-- GENERAL SECTION -->
        <section id="sec-general" class="admin-section">
            <div class="edit-card">
                <h3>Configurações Gerais</h3>
                <div class="form-row">
                    <div>
                        <label>Nome da Agência</label>
                        <input type="text" id="site-name">
                    </div>
                </div>
            </div>
        </section>

        <!-- HERO SECTION -->
        <section id="sec-hero" class="admin-section" style="display:none;">
            <div class="edit-card">
                <h3>Hero & Branding</h3>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>Título Principal (HTML permitido)</label>
                    <input type="text" id="hero-title">
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>Descrição</label>
                    <textarea id="hero-desc" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div>
                        <label>Floating ROI</label>
                        <input type="text" id="hero-roi">
                    </div>
                    <div>
                        <label>Floating Leads</label>
                        <input type="text" id="hero-leads">
                    </div>
                </div>
            </div>
        </section>

        <!-- CONTENT SECTION -->
        <section id="sec-content" class="admin-section" style="display:none;">
             <div class="edit-card" id="services-editor">
                <h3>Serviços</h3>
                <div id="services-list"></div>
             </div>
             <div class="edit-card" id="stats-editor">
                <h3>Estatísticas / Números</h3>
                <div id="stats-list" class="form-row"></div>
             </div>
        </section>

        <!-- LEADS SECTION -->
        <section id="sec-leads" class="admin-section" style="display:none;">
            <div class="edit-card">
                <h3>Mensagens Recebidas</h3>
                <table class="table-admin">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Nome</th>
                            <th>Empresa</th>
                            <th>Mensagem</th>
                        </tr>
                    </thead>
                    <tbody id="leads-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div class="save-bar">
        <span id="status" style="font-size: 0.85rem; color: var(--accent);">Pronto</span>
        <button class="btn btn-primary" onclick="saveAll()" style="padding: 0.7rem 1.5rem; font-size: 0.85rem;">Salvar Alterações</button>
    </div>

    <script>
        let fullData = {};

        async function loadContent() {
            const res = await fetch('/api/content');
            fullData = await res.json();
            
            // Map to inputs
            document.getElementById('site-name').value = fullData.site.name;
            document.getElementById('hero-title').value = fullData.hero.title;
            document.getElementById('hero-desc').value = fullData.hero.description;
            document.getElementById('hero-roi').value = fullData.hero.floating_roi;
            document.getElementById('hero-leads').value = fullData.hero.floating_leads;

            // Stats
            const statsCont = document.getElementById('stats-list');
            statsCont.innerHTML = fullData.statistics.map((s, idx) => `
                <div>
                    <label>${s.label}</label>
                    <input type="number" onchange="fullData.statistics[${idx}].target = this.value" value="${s.target}">
                </div>
            `).join('');

            // Leads
            const leadsBody = document.getElementById('leads-body');
            const contacts = fullData.contacts || [];
            leadsBody.innerHTML = [...contacts].reverse().map(c => `
                <tr>
                    <td>${c.date}</td>
                    <td>${c.name}<br><small>${c.email}</small></td>
                    <td>${c.company || '-'}</td>
                    <td><div class="msg-preview" title="${c.message}">${c.message}</div></td>
                </tr>
            `).join('');
        }

        function showSection(id) {
            document.querySelectorAll('.admin-section').forEach(s => s.style.display = 'none');
            document.getElementById('sec-' + id).style.display = 'block';
            document.querySelectorAll('.admin-nav a').forEach(a => a.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
        }

        async function saveAll() {
            const btn = document.querySelector('.save-bar button');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            status.innerText = "Salvando...";

            // Update data from inputs
            fullData.site.name = document.getElementById('site-name').value;
            fullData.hero.title = document.getElementById('hero-title').value;
            fullData.hero.description = document.getElementById('hero-desc').value;
            fullData.hero.floating_roi = document.getElementById('hero-roi').value;
            fullData.hero.floating_leads = document.getElementById('hero-leads').value;

            const res = await fetch('/api/content', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(fullData)
            });

            if (res.ok) {
                status.innerText = "Salvo com sucesso!";
                setTimeout(() => { status.innerText = "Pronto"; }, 3000);
            } else {
                status.innerText = "Erro ao salvar";
            }
            btn.disabled = false;
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/admin';
        }

        loadContent();
    </script>
</body>
</html>
