<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA DIGITAL | Login Administrativo</title>
    <link rel="stylesheet" href="/public/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: var(--bg-surface);
            padding: 3rem;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            text-align: center;
        }
        .login-card h2 { margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); }
        .error-msg { color: var(--secondary); margin-bottom: 1rem; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <span class="logo-text">AURA<span>ADMIN</span></span>
        <h2>Acesso Restrito</h2>
        <p id="error" class="error-msg">Credenciais inválidas</p>
        <form id="loginForm">
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" id="username" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary block">Entrar no Painel</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                window.location.href = '/admin';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        };
    </script>
</body>
</html>
